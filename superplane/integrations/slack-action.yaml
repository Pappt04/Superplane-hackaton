name: "Slack Action Integration"
description: |
  Slack notification templates for both auto-resolved and human-escalation scenarios.
  Uses slack.sendTextMessage component in SuperPlane with Slack markdown formatting.

component:
  name: "slack.sendTextMessage"
  required_configuration:
    channel: "#incidents"
    text: "<message body — see templates below>"

templates:
  auto_resolved:
    description: "Sent when AI fixes the incident automatically"
    channel: "#incidents"
    text: |
      ✅ *AI On-Call resolved the incident automatically*

      *Service:* {{ $["Receive Investigation Request"].data.alert.service }}
      *Root cause:* {{ $["Call AI Agent"].data.body.root_cause }}
      *Actions taken:* {{ $["Call AI Agent"].data.body.actions_taken }}
      *Confidence:* {{ $["Call AI Agent"].data.body.confidence }}

      _No human intervention required._

  human_escalation:
    description: "Sent when AI cannot fix — requires human action"
    channel: "#incidents"
    text: |
      🚨 *INCIDENT ESCALATION — Human action required*

      *Service:* `{{ $["Receive Escalation"].data.service }}`
      *Root Cause:* {{ $["Receive Escalation"].data.root_cause }}

      *What the AI tried:*
      {{ $["Receive Escalation"].data.actions_taken }}

      *Proposed fix:*
      {{ $["Receive Escalation"].data.proposed_fix }}

      *AI Confidence:* {{ $["Receive Escalation"].data.confidence }}

      ---
      _AI On-Call was unable to resolve this automatically. Please investigate immediately._

slack_setup:
  steps:
    - "Create a Slack app at https://api.slack.com/apps"
    - "Enable Incoming Webhooks or Bot Token Scopes: chat:write"
    - "Invite the bot to #incidents channel"
    - "Add the Slack integration in SuperPlane Settings > Integrations"
    - "Set SLACK_WEBHOOK_URL in .env for direct webhook (used by webhook-server.ts as fallback)"
  environment_variables:
    SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/T.../B.../..."
