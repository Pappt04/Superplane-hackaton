metadata:
  name: "Human Escalation"
  description: "Sends a Discord webhook message to #incidents when the AI agent could not resolve the incident automatically."
  isTemplate: false
spec:
  nodes:
    - id: "webhook-trigger-escalation"
      name: "Receive Escalation"
      type: "TYPE_TRIGGER"
      configuration: {}
      metadata: null
      position:
        x: 200
        "y": 400
      component: null
      blueprint: null
      trigger:
        name: "webhook"
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    - id: "discord-escalation-message"
      name: "Post Escalation to Discord"
      type: "TYPE_COMPONENT"
      configuration:
        method: "POST"
        url: "{{ env.DISCORD_WEBHOOK_URL }}"
        successCodes: "204"
        timeoutSeconds: 10
        headers:
          Content-Type: "application/json"
        body: |
          {
            "content": "🚨 INCIDENT ESCALATION — Requires immediate human action",
            "embeds": [{
              "title": "Incident Escalated to Human Team",
              "description": "The AI agent could not automatically resolve this incident",
              "color": 16711680,
              "fields": [
                {"name": "Service", "value": "`{{ $[\"Receive Escalation\"].data.service }}`", "inline": true},
                {"name": "Root Cause", "value": "{{ $[\"Receive Escalation\"].data.root_cause }}"},
                {"name": "AI Attempted Actions", "value": "{{ $[\"Receive Escalation\"].data.actions_taken }}"},
                {"name": "Proposed Fix", "value": "{{ $[\"Receive Escalation\"].data.proposed_fix }}"},
                {"name": "AI Confidence", "value": "{{ $[\"Receive Escalation\"].data.confidence }}", "inline": true},
                {"name": "Full Timeline", "value": "{{ $[\"Receive Escalation\"].data.full_timeline }}"}
              ],
              "footer": {"text": "AI On-Call — Manual investigation needed"}
            }]
          }
      metadata: null
      position:
        x: 700
        "y": 400
      component:
        name: "http"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

  edges:
    - sourceId: "webhook-trigger-escalation"
      targetId: "discord-escalation-message"
      channel: "default"
