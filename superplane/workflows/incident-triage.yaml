metadata:
  name: "Incident Triage"
  description: "Receives a Grafana/PagerDuty alert, collects 6 context sources in parallel (logs, metrics, deployments, GitHub diff, infra health, DB stats), then forwards the enriched context to AI Investigation."
  isTemplate: false
spec:
  nodes:
    - id: "webhook-trigger-receive-alert"
      name: "Receive Alert"
      type: "TYPE_TRIGGER"
      configuration: {}
      metadata: null
      position:
        x: 200
        "y": 600
      component: null
      blueprint: null
      trigger:
        name: "webhook"
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    # ── Parallel context fetch: existing sources ──────────────────────────────

    - id: "http-get-logs"
      name: "Get Logs"
      type: "TYPE_COMPONENT"
      configuration:
        method: "GET"
        url: "http://localhost:3000/mock/logs?service={{ $[\"Receive Alert\"].data.service }}&minutes=30"
        successCodes: "2xx"
        timeoutSeconds: 15
      metadata: null
      position:
        x: 700
        "y": 100
      component:
        name: "http"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    - id: "http-get-metrics"
      name: "Get Metrics"
      type: "TYPE_COMPONENT"
      configuration:
        method: "GET"
        url: "http://localhost:3000/mock/metrics?service={{ $[\"Receive Alert\"].data.service }}"
        successCodes: "2xx"
        timeoutSeconds: 15
      metadata: null
      position:
        x: 700
        "y": 300
      component:
        name: "http"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    - id: "http-get-deployments"
      name: "Get Recent Deployments"
      type: "TYPE_COMPONENT"
      configuration:
        method: "GET"
        url: "http://localhost:3000/mock/deployments?service={{ $[\"Receive Alert\"].data.service }}&hours=24"
        successCodes: "2xx"
        timeoutSeconds: 15
      metadata: null
      position:
        x: 700
        "y": 500
      component:
        name: "http"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    # ── Parallel context fetch: new enrichment sources ────────────────────────

    - id: "http-get-github-diff"
      name: "Get GitHub Diff"
      type: "TYPE_COMPONENT"
      configuration:
        method: "GET"
        url: "http://localhost:3000/mock/github-diff?service={{ $[\"Receive Alert\"].data.service }}"
        successCodes: "2xx"
        timeoutSeconds: 20
        # Production: replace url with the real GitHub Compare API call:
        # https://api.github.com/repos/{env.GITHUB_ORG}/{service}/compare/{base}...{head}
        # headers:
        #   Authorization: "Bearer {{ env.GITHUB_TOKEN }}"
        #   Accept: "application/vnd.github+json"
        #   X-GitHub-Api-Version: "2022-11-28"
      metadata: null
      position:
        x: 700
        "y": 700
      component:
        name: "http"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    - id: "http-get-infra-health"
      name: "Get Infrastructure Health"
      type: "TYPE_COMPONENT"
      configuration:
        method: "GET"
        url: "http://localhost:3000/mock/infra-health?region={{ env.AWS_REGION }}"
        successCodes: "2xx"
        timeoutSeconds: 20
        # Production: replace url with AWS Health API endpoint
        # POST https://health.us-east-1.amazonaws.com/
        # headers:
        #   Authorization: "AWS Signature v4 — {{ env.AWS_ACCESS_KEY_ID }}"
        #   Content-Type: "application/x-amz-json-1.1"
        #   X-Amz-Target: "AmazonHealthAPIService.DescribeEvents"
      metadata: null
      position:
        x: 700
        "y": 900
      component:
        name: "http"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    - id: "http-get-db-stats"
      name: "Get Database Statistics"
      type: "TYPE_COMPONENT"
      configuration:
        method: "GET"
        url: "http://localhost:3000/mock/db-stats?service={{ $[\"Receive Alert\"].data.service }}"
        successCodes: "2xx"
        timeoutSeconds: 15
        # Production: replace url with direct Prometheus query:
        # {{ env.PROMETHEUS_URL }}/api/v1/query?query=pg_stat_activity_count{service="{{ $["Receive Alert"].data.service }}"}
        # headers:
        #   Authorization: "Bearer {{ env.PROMETHEUS_TOKEN }}"
      metadata: null
      position:
        x: 700
        "y": 1100
      component:
        name: "http"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    # ── Merge all 6 sources ───────────────────────────────────────────────────

    - id: "merge-context"
      name: "Merge Context"
      type: "TYPE_COMPONENT"
      configuration:
        enableStopIf: false
        enableTimeout: true
        executionTimeout:
          unit: "seconds"
          value: 45
      metadata: null
      position:
        x: 1300
        "y": 600
      component:
        name: "merge"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    # ── Forward enriched context to AI Investigation ──────────────────────────

    - id: "http-forward-to-investigation"
      name: "Forward to AI Investigation"
      type: "TYPE_COMPONENT"
      configuration:
        method: "POST"
        url: "http://localhost:3000/trigger/investigate"
        successCodes: "2xx"
        timeoutSeconds: 10
        headers:
          Content-Type: "application/json"
        body: |
          {
            "alert": {
              "service": "{{ $["Receive Alert"].data.service }}",
              "severity": "{{ $["Receive Alert"].data.severity }}",
              "message": "{{ $["Receive Alert"].data.message }}",
              "timestamp": "{{ $["Receive Alert"].data.timestamp }}"
            },
            "context": {
              "logs": {{ $["Get Logs"].data.body }},
              "metrics": {{ $["Get Metrics"].data.body }},
              "deployments": {{ $["Get Recent Deployments"].data.body }},
              "github_diff": {{ $["Get GitHub Diff"].data.body }},
              "infra_health": {{ $["Get Infrastructure Health"].data.body }},
              "db_stats": {{ $["Get Database Statistics"].data.body }}
            }
          }
      metadata: null
      position:
        x: 1800
        "y": 600
      component:
        name: "http"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

  edges:
    # Trigger → all 6 parallel fetches
    - sourceId: "webhook-trigger-receive-alert"
      targetId: "http-get-logs"
      channel: "default"
    - sourceId: "webhook-trigger-receive-alert"
      targetId: "http-get-metrics"
      channel: "default"
    - sourceId: "webhook-trigger-receive-alert"
      targetId: "http-get-deployments"
      channel: "default"
    - sourceId: "webhook-trigger-receive-alert"
      targetId: "http-get-github-diff"
      channel: "default"
    - sourceId: "webhook-trigger-receive-alert"
      targetId: "http-get-infra-health"
      channel: "default"
    - sourceId: "webhook-trigger-receive-alert"
      targetId: "http-get-db-stats"
      channel: "default"
    # All 6 sources → merge
    - sourceId: "http-get-logs"
      targetId: "merge-context"
      channel: "success"
    - sourceId: "http-get-metrics"
      targetId: "merge-context"
      channel: "success"
    - sourceId: "http-get-deployments"
      targetId: "merge-context"
      channel: "success"
    - sourceId: "http-get-github-diff"
      targetId: "merge-context"
      channel: "success"
    - sourceId: "http-get-infra-health"
      targetId: "merge-context"
      channel: "success"
    - sourceId: "http-get-db-stats"
      targetId: "merge-context"
      channel: "success"
    # Merge → forward
    - sourceId: "merge-context"
      targetId: "http-forward-to-investigation"
      channel: "success"
