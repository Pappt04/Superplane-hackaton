global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "superplane-agent"
    metrics_path: /health
    static_configs:
      - targets: ["agent:3001"]
    # Health endpoint returns JSON, not Prometheus metrics.
    # This confirms the agent is reachable; replace with /metrics
    # once a Prometheus metrics endpoint is added to the agent.
