global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "superplane-agent"
    metrics_path: /health
    static_configs:
      - targets: ["agent:3001"]

  - job_name: "payment-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:3002"]
    relabel_configs:
      - target_label: service
        replacement: payment-service
