<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI On-Call — Incident Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --green: #00ff41;
      --green-dim: #00cc33;
      --red: #ff4444;
      --amber: #ffaa00;
      --blue: #58a6ff;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --font: 'Courier New', Courier, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--green);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--bg);
      font-weight: bold;
    }

    h1 {
      font-size: 18px;
      color: var(--green);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--amber);
      animation: pulse 2s infinite;
    }

    .connection-dot.connected { background: var(--green); }
    .connection-dot.disconnected { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Main layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stats {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .stat-value { color: var(--text); font-weight: bold; }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .btn:hover { border-color: var(--green); color: var(--green); }
    .btn:active { background: var(--bg3); }

    .btn-danger {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-danger:hover {
      background: rgba(255, 68, 68, 0.1);
      border-color: var(--red);
      color: var(--red);
    }

    .btn-primary {
      border-color: var(--amber);
      color: var(--amber);
    }

    .btn-primary:hover {
      background: rgba(255, 170, 0, 0.1);
      color: var(--amber);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Terminal log ── */
    .terminal-log {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 12px;
      color: var(--green-dim);
      margin-bottom: 20px;
      min-height: 40px;
      max-height: 60px;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .terminal-prompt { color: var(--green); }
    .terminal-text { color: var(--text-dim); }
    .blink {
      animation: blink 1s step-end infinite;
      color: var(--green);
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Incident list ── */
    .incident-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
      font-size: 14px;
      border: 1px dashed var(--border);
      border-radius: 6px;
    }

    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { margin-bottom: 8px; }

    /* ── Incident card ── */
    .incident-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .incident-card:hover { border-color: #40464e; }
    .incident-card.new-card {
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .incident-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }

    .incident-header:hover { background: var(--bg3); }

    .status-badge {
      font-size: 10px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 1px;
      min-width: 110px;
      text-align: center;
      white-space: nowrap;
    }

    .badge-alert     { background: rgba(255,170,0,0.15); color: var(--amber); border: 1px solid rgba(255,170,0,0.3); }
    .badge-active    { background: rgba(88,166,255,0.15); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
    .badge-resolved  { background: rgba(0,255,65,0.1); color: var(--green); border: 1px solid rgba(0,255,65,0.3); }
    .badge-escalated { background: rgba(255,68,68,0.15); color: var(--red); border: 1px solid rgba(255,68,68,0.3); }
    .badge-failed    { background: rgba(255,68,68,0.1); color: #ff8888; border: 1px solid rgba(255,68,68,0.2); }

    .incident-service {
      font-size: 14px;
      font-weight: bold;
      color: var(--text);
      flex: 1;
    }

    .incident-severity {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sev-critical { background: rgba(255,68,68,0.2); color: var(--red); }
    .sev-high     { background: rgba(255,170,0,0.2); color: var(--amber); }
    .sev-medium   { background: rgba(88,166,255,0.2); color: var(--blue); }
    .sev-low      { background: rgba(0,255,65,0.1); color: var(--green); }

    .incident-time {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .expand-icon {
      color: var(--text-dim);
      font-size: 12px;
      transition: transform 0.2s;
      margin-left: 4px;
    }

    .incident-card.expanded .expand-icon {
      transform: rotate(180deg);
    }

    .incident-message {
      font-size: 12px;
      color: var(--text-dim);
      padding: 0 16px 10px;
      margin-top: -4px;
    }

    /* ── Expanded detail ── */
    .incident-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px;
      background: var(--bg);
    }

    .incident-card.expanded .incident-detail {
      display: block;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 700px) {
      .detail-grid { grid-template-columns: 1fr; }
    }

    .detail-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
    }

    .detail-section.full-width {
      grid-column: 1 / -1;
    }

    .detail-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }

    .confidence-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--green);
      transition: width 0.5s ease;
    }

    .bar-fill.low  { background: var(--red); }
    .bar-fill.mid  { background: var(--amber); }
    .bar-fill.high { background: var(--green); }

    .actions-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .actions-list li {
      font-size: 12px;
      color: var(--text-dim);
      padding-left: 14px;
      position: relative;
    }

    .actions-list li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--green);
    }

    .timeline-box {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <h1>AI On-Call</h1>
      <div class="subtitle">Incident Dashboard — SuperPlane + Groq Llama 4</div>
    </div>
  </div>
  <div class="header-right">
    <div class="connection-status">
      <div class="connection-dot" id="connDot"></div>
      <span id="connLabel">Connecting...</span>
    </div>
  </div>
</header>

<main>
  <div class="controls">
    <div class="stats">
      <span>Total: <span class="stat-value" id="statTotal">0</span></span>
      <span>Resolved: <span class="stat-value" id="statResolved" style="color:var(--green)">0</span></span>
      <span>Escalated: <span class="stat-value" id="statEscalated" style="color:var(--red)">0</span></span>
      <span>Active: <span class="stat-value" id="statActive" style="color:var(--amber)">0</span></span>
      <span>Avg MTTR: <span class="stat-value" id="statMttr" style="color:var(--blue)">—</span></span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-danger" onclick="triggerScenario('a')">💥 Scenario A (AI fixes)</button>
      <button class="btn" style="border-color:var(--red);color:var(--red)" onclick="triggerScenario('b')">🔴 Scenario B (Escalate)</button>
      <button class="btn btn-primary" id="btnDemo" onclick="triggerDemo()">⚡ Demo Incident</button>
      <button class="btn" onclick="clearAll()">🗑 Clear</button>
    </div>
  </div>

  <div class="terminal-log">
    <span class="terminal-prompt">$</span>
    <span class="terminal-text" id="termLog">Waiting for incidents...</span>
    <span class="blink">█</span>
  </div>

  <div class="incident-list" id="incidentList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🛡</div>
      <p>All systems operational.</p>
      <p style="font-size:12px">Click <strong style="color:var(--amber)">Trigger Demo Incident</strong> to simulate an incident.</p>
    </div>
  </div>
</main>

<script>
  // ── State ──────────────────────────────────────────────────────────────────

  const incidents = new Map(); // incidentId -> { card, data }
  let totalCount = 0, resolvedCount = 0, escalatedCount = 0, activeCount = 0;

  // ── SSE connection ─────────────────────────────────────────────────────────

  let es;
  function connectSSE() {
    es = new EventSource('http://localhost:3003/events');

    es.onopen = () => {
      setConn(true);
      setLog('Connected to live event stream');
    };

    es.onmessage = (e) => {
      try {
        const event = JSON.parse(e.data);
        handleEvent(event);
      } catch { /* ignore malformed */ }
    };

    es.onerror = () => {
      setConn(false);
      setLog('Connection lost — retrying...');
      // EventSource auto-reconnects
    };
  }

  function setConn(ok) {
    const dot = document.getElementById('connDot');
    const label = document.getElementById('connLabel');
    dot.className = 'connection-dot ' + (ok ? 'connected' : 'disconnected');
    label.textContent = ok ? 'Live' : 'Reconnecting...';
  }

  // ── Event handling ─────────────────────────────────────────────────────────

  function handleEvent(event) {
    const { type, incidentId, alert, result, error, demo } = event;

    switch (type) {
      case 'ALERT_RECEIVED': {
        const id = incidentId || `alert-${Date.now()}`;
        removeEmpty();
        createCard(id, alert, 'ALERT', demo);
        totalCount++;
        activeCount++;
        updateStats();
        setLog(`Alert received: ${alert?.service} [${alert?.severity}]`);
        break;
      }
      case 'INVESTIGATION_STARTED': {
        updateCard(incidentId, 'INVESTIGATING', null, null);
        setLog(`AI investigating: ${alert?.service}...`);
        break;
      }
      case 'INCIDENT_RESOLVED': {
        updateCard(incidentId || findCardByService(alert?.service), 'RESOLVED', result, alert);
        resolvedCount++;
        activeCount = Math.max(0, activeCount - 1);
        if (result?.mttr_seconds) mttrValues.push(result.mttr_seconds);
        updateStats();
        const mttrStr = result?.mttr_seconds ? (result.mttr_seconds < 60 ? result.mttr_seconds + 's' : Math.floor(result.mttr_seconds/60) + 'm ' + (result.mttr_seconds%60) + 's') : '';
        setLog(`✅ AI resolved: ${alert?.service}${mttrStr ? ' in ' + mttrStr : ''} — ${result?.root_cause?.slice(0, 50)}...`);
        break;
      }
      case 'INCIDENT_ESCALATED': {
        updateCard(incidentId || findCardByService(alert?.service), 'ESCALATED', result, alert);
        escalatedCount++;
        activeCount = Math.max(0, activeCount - 1);
        updateStats();
        setLog(`🚨 Escalated to human: ${alert?.service}`);
        break;
      }
      case 'HUMAN_ESCALATION': {
        const service = event.service;
        const id = findCardByService(service) || `esc-${Date.now()}`;
        if (!incidents.has(id)) {
          removeEmpty();
          createCard(id, { service, severity: 'critical', message: event.root_cause, timestamp: event.timestamp }, 'ALERT', false);
          totalCount++;
          updateStats();
        }
        updateCard(id, 'ESCALATED', {
          root_cause: event.root_cause,
          actions_taken: event.actions_taken || [],
          fix_applied: false,
          proposed_fix: event.proposed_fix,
          confidence: event.confidence,
          full_timeline: event.full_timeline,
        }, { service });
        setLog(`🚨 Human escalation: ${service}`);
        break;
      }
      case 'INVESTIGATION_FAILED': {
        updateCard(incidentId || findCardByService(alert?.service), 'FAILED', null, null, error);
        setLog(`Investigation failed: ${error}`);
        break;
      }
    }
  }

  function findCardByService(service) {
    for (const [id, inc] of incidents.entries()) {
      if (inc.service === service) return id;
    }
    return null;
  }

  // ── Card rendering ─────────────────────────────────────────────────────────

  function removeEmpty() {
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();
  }

  function badgeClass(status) {
    return { ALERT: 'badge-alert', INVESTIGATING: 'badge-active', RESOLVED: 'badge-resolved', ESCALATED: 'badge-escalated', FAILED: 'badge-failed' }[status] || 'badge-alert';
  }

  function badgeText(status) {
    return { ALERT: '● ALERT', INVESTIGATING: '⟳ INVESTIGATING', RESOLVED: '✓ RESOLVED', ESCALATED: '⚠ ESCALATED', FAILED: '✗ FAILED' }[status] || status;
  }

  function sevClass(sev) {
    return { critical: 'sev-critical', high: 'sev-high', medium: 'sev-medium', low: 'sev-low' }[sev] || 'sev-high';
  }

  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return new Date(ts).toLocaleTimeString();
  }

  function createCard(id, alert, status, demo) {
    const list = document.getElementById('incidentList');
    const card = document.createElement('div');
    card.className = 'incident-card new-card';
    card.id = `card-${id}`;
    card.dataset.service = alert?.service || '';

    const sev = alert?.severity || 'high';
    const ts = alert?.timestamp || new Date().toISOString();

    card.innerHTML = `
      <div class="incident-header" onclick="toggleCard('${id}')">
        <span class="status-badge ${badgeClass(status)}" id="badge-${id}">${badgeText(status)}</span>
        <span class="incident-service">${escHtml(alert?.service || 'unknown')}</span>
        <span class="incident-severity ${sevClass(sev)}">${sev}</span>
        ${demo ? '<span style="font-size:11px;color:var(--text-dim);padding:2px 6px;border:1px solid var(--border);border-radius:3px;">DEMO</span>' : ''}
        <span class="incident-time" id="time-${id}">${timeAgo(ts)}</span>
        <span class="expand-icon" id="expand-${id}">▼</span>
      </div>
      <div class="incident-message" id="msg-${id}">${escHtml(alert?.message || '')}</div>
      <div class="incident-detail" id="detail-${id}">
        <div style="color:var(--text-dim);font-size:12px;font-style:italic;">Waiting for AI investigation...</div>
      </div>
    `;

    list.prepend(card);
    incidents.set(id, { card, service: alert?.service, ts });

    // Remove new-card animation class after it plays
    setTimeout(() => card.classList.remove('new-card'), 400);
  }

  function updateCard(id, status, result, alert, error) {
    if (!id) return;
    const badge = document.getElementById(`badge-${id}`);
    const detail = document.getElementById(`detail-${id}`);
    const card = document.getElementById(`card-${id}`);

    if (badge) {
      badge.className = `status-badge ${badgeClass(status)}`;
      badge.textContent = badgeText(status);
    }

    if (alert?.message) {
      const msgEl = document.getElementById(`msg-${id}`);
      if (msgEl) msgEl.textContent = alert.message;
    }

    if (result && detail) {
      const conf = result.confidence || 0;
      const confPct = Math.round(conf * 100);
      const barClass = conf >= 0.7 ? 'high' : conf >= 0.4 ? 'mid' : 'low';
      const actionsList = Array.isArray(result.actions_taken)
        ? result.actions_taken.map(a => `<li>${escHtml(a)}</li>`).join('')
        : `<li>${escHtml(String(result.actions_taken || 'None'))}</li>`;

      detail.innerHTML = `
        <div class="detail-grid">
          <div class="detail-section">
            <div class="detail-label">Root Cause</div>
            <div class="detail-value">${escHtml(result.root_cause || 'Unknown')}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Confidence</div>
            <div class="confidence-bar">
              <div class="bar-track"><div class="bar-fill ${barClass}" style="width:${confPct}%"></div></div>
              <span class="detail-value">${confPct}%</span>
            </div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Actions Taken</div>
            <ul class="actions-list">${actionsList}</ul>
          </div>
          <div class="detail-section">
            <div class="detail-label">Proposed Fix</div>
            <div class="detail-value">${escHtml(result.proposed_fix || 'N/A')}</div>
          </div>
          <div class="detail-section full-width">
            <div class="detail-label">Full Timeline</div>
            <div class="timeline-box">${escHtml(result.full_timeline || '')}</div>
          </div>
          ${result.postmortem ? `
          <div class="detail-section full-width" style="margin-top:8px;">
            <div class="detail-label">Postmortem Report</div>
            <div class="timeline-box" style="white-space:pre-wrap;color:var(--text)">${escHtml(result.postmortem)}</div>
          </div>` : ''}
          ${result.mttr_seconds ? `
          <div class="detail-section" style="margin-top:8px;">
            <div class="detail-label">MTTR</div>
            <div class="detail-value" style="color:var(--green);font-size:20px;font-weight:bold;">${result.mttr_seconds < 60 ? result.mttr_seconds + 's' : Math.floor(result.mttr_seconds/60) + 'm ' + (result.mttr_seconds%60) + 's'}</div>
          </div>` : ''}
        </div>
      `;

      // Auto-expand on resolution/escalation
      if ((status === 'RESOLVED' || status === 'ESCALATED') && card) {
        card.classList.add('expanded');
      }
    } else if (error && detail) {
      detail.innerHTML = `<div style="color:var(--red);font-size:13px;">Investigation failed: ${escHtml(error)}</div>`;
    }
  }

  function toggleCard(id) {
    const card = document.getElementById(`card-${id}`);
    if (card) card.classList.toggle('expanded');
  }

  // ── Stats ──────────────────────────────────────────────────────────────────

  const mttrValues = [];

  function updateStats() {
    document.getElementById('statTotal').textContent = totalCount;
    document.getElementById('statResolved').textContent = resolvedCount;
    document.getElementById('statEscalated').textContent = escalatedCount;
    document.getElementById('statActive').textContent = activeCount;
    if (mttrValues.length > 0) {
      const avg = Math.round(mttrValues.reduce((a, b) => a + b, 0) / mttrValues.length);
      document.getElementById('statMttr').textContent = avg < 60 ? avg + 's' : Math.floor(avg/60) + 'm ' + (avg%60) + 's';
    }
  }

  // ── Terminal log ────────────────────────────────────────────────────────────

  function setLog(msg) {
    document.getElementById('termLog').textContent = msg;
  }

  // ── Actions ────────────────────────────────────────────────────────────────

  async function triggerDemo() {
    const btn = document.getElementById('btnDemo');
    btn.disabled = true;
    btn.textContent = '⟳ Triggering...';
    try {
      const res = await fetch('http://localhost:3000/demo/trigger', { method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ service: 'payment-service', severity: 'critical' }) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setLog('Demo incident triggered — AI investigation starting...');
    } catch (e) {
      setLog(`Error: ${e.message}`);
    } finally {
      setTimeout(() => { btn.disabled = false; btn.textContent = '⚡ Trigger Demo Incident'; }, 2000);
    }
  }

  async function triggerScenario(scenario) {
    try {
      const res = await fetch(`http://localhost:3002/chaos/scenario-${scenario}`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setLog(`Scenario ${scenario.toUpperCase()} triggered — ${scenario === 'a' ? 'AI will fix this' : 'AI will escalate this'}`);
    } catch (e) {
      setLog(`Error: Cannot reach mock service — is it running on port 3002? (${e.message})`);
    }
  }

  async function triggerCrash() {
    const btn = document.getElementById('btnCrash');
    btn.disabled = true;
    btn.textContent = '⟳ Crashing...';
    try {
      const res = await fetch('http://localhost:3002/chaos/crash', { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setLog('💥 Service crash initiated — Grafana alert will fire in ~1s');
    } catch (e) {
      setLog(`Error: Cannot reach mock service — is it running on port 3002? (${e.message})`);
    } finally {
      setTimeout(() => { btn.disabled = false; btn.textContent = '💥 Crash Service'; }, 3000);
    }
  }

  function clearAll() {
    document.getElementById('incidentList').innerHTML =
      `<div class="empty-state" id="emptyState"><div class="empty-icon">🛡</div><p>All systems operational.</p><p style="font-size:12px">Click <strong style="color:var(--amber)">Trigger Demo Incident</strong> to simulate an incident.</p></div>`;
    incidents.clear();
    totalCount = resolvedCount = escalatedCount = activeCount = 0;
    updateStats();
    setLog('Cleared all incidents');
  }

  // ── Util ───────────────────────────────────────────────────────────────────

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Update timestamps every 30s
  setInterval(() => {
    incidents.forEach(({ ts }, id) => {
      const el = document.getElementById(`time-${id}`);
      if (el && ts) el.textContent = timeAgo(ts);
    });
  }, 30_000);

  // ── Init ───────────────────────────────────────────────────────────────────
  connectSSE();
</script>
</body>
</html>
